<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gym Progress Tracker{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/index.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#FF3366">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Theme Initialization (Prevents FOUC) -->
    <script>
        // --- Sync Queue System ---
        const syncQueue = {
            async sync() {
                if (!navigator.onLine) return;
                const pending = JSON.parse(localStorage.getItem('pending_logs') || '[]');
                if (pending.length === 0) return;

                console.log(`Syncing ${pending.length} offline logs...`);
                
                const remaining = [];
                for (const log of pending) {
                    try {
                        const response = await fetch(log.url, {
                            method: 'POST',
                            body: new URLSearchParams(log.data),
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                        });
                        if (!response.ok) throw new Error('Sync failed');
                    } catch (err) {
                        remaining.push(log);
                    }
                }
                
                localStorage.setItem('pending_logs', JSON.stringify(remaining));
                if (remaining.length === 0) {
                    this.showToast('✅ Workouts synced to cloud!');
                }
            },
            
            saveLocally(url, data) {
                const pending = JSON.parse(localStorage.getItem('pending_logs') || '[]');
                pending.push({ url, data, timestamp: new Date().toISOString() });
                localStorage.setItem('pending_logs', JSON.stringify(pending));
                this.showToast('📶 Offline: Saved to phone!');
            },

            showToast(msg) {
                const toast = document.createElement('div');
                toast.className = 'sync-toast';
                toast.innerText = msg;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
        };

        // Listen for online status
        window.addEventListener('online', () => syncQueue.sync());
        window.addEventListener('load', () => syncQueue.sync());

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker: Registered (Root)'))
                    .catch(err => console.log('Service Worker: Error', err));
            });
        }
        // --- Translation System ---
        const translations = {
            en: {
                nav_home: "Dashboard",
                nav_log: "Log Workout",
                nav_history: "History",
                nav_timer: "Rest Timer",
                nav_ask: "Ask AI",
                header_dashboard: "Dashboard",
                header_log: "Log Workout",
                header_history: "Workout History",
                header_timer: "Rest Timer",
                header_settings: "Settings",
                subheader_dashboard: "Here's your performance at a glance.",
                subheader_log: "Track your progress, one set at a time.",
                subheader_history: "Review your past sessions.",
                subheader_timer: "Time your rest for maximum gains.",
                subheader_settings: "Customize your tracking experience.",
                btn_add_set: "+ Add Set",
                btn_finish: "Finish Workout",
                btn_clear: "Clear All"
            },
            hi: {
                nav_home: "डैशबोर्ड",
                nav_log: "वर्कआउट दर्ज करें",
                nav_history: "इतिहास",
                nav_timer: "टाइमर",
                nav_ask: "AI से पूछें",
                header_dashboard: "डैशबोर्ड",
                header_log: "वर्कआउट लॉग",
                header_history: "वर्कआउट इतिहास",
                header_timer: "रेस्ट टाइमर",
                header_settings: "सेटिंग्स",
                subheader_dashboard: "एक नज़र में आपका प्रदर्शन।",
                subheader_log: "अपनी प्रगति को ट्रैक करें।",
                subheader_history: "अपने पिछले सत्रों की समीक्षा करें।",
                subheader_timer: "अधिकतम लाभ के लिए अपने आराम का समय तय करें।",
                subheader_settings: "अपने अनुभव को कस्टमाइज़ करें।",
                btn_add_set: "+ सेट जोड़ें",
                btn_finish: "वर्कआउट समाप्त करें",
                btn_clear: "सब साफ़ करें"
            },
            es: {
                nav_home: "Panel",
                nav_log: "Registrar",
                nav_history: "Historial",
                nav_timer: "Temporizador",
                nav_ask: "Preguntar AI",
                header_dashboard: "Panel de Control",
                header_log: "Registrar Entrenamiento",
                header_history: "Historial de Entrenamiento",
                header_timer: "Temporizador de Descanso",
                header_settings: "Ajustes",
                subheader_dashboard: "Tu rendimiento de un vistazo.",
                subheader_log: "Sigue tu progreso, serie por serie.",
                subheader_history: "Revisa tus sesiones pasadas.",
                subheader_timer: "Cronometra tu descanso para obtener el máximo beneficio.",
                subheader_settings: "Personaliza tu experiencia.",
                btn_add_set: "+ Añadir Serie",
                btn_finish: "Terminar Entrenamiento",
                btn_clear: "Borrar Todo"
            }
        };

        function translatePage() {
            const lang = localStorage.getItem('preferredLanguage') || 'en';
            const dict = translations[lang] || translations.en;

            // Translate Navigation (Desktop and Mobile)
            const navMap = {
                'nav-home': 'nav_home',
                'nav-log': 'nav_log',
                'nav-history': 'nav_history',
                'nav-timer': 'nav_timer',
                'nav-ask': 'nav_ask'
            };

            for (const [className, key] of Object.entries(navMap)) {
                document.querySelectorAll(`.${className}`).forEach(el => {
                    el.innerText = dict[key];
                });
            }

            // Translate Headers & Subheaders
            const header = document.querySelector('header h1');
            const subheader = document.querySelector('header p');
            
            const path = window.location.pathname;
            let pageKey = "dashboard";
            if (path.includes('log')) pageKey = "log";
            else if (path.includes('history')) pageKey = "history";
            else if (path.includes('timer')) pageKey = "timer";
            else if (path.includes('settings')) pageKey = "settings";

            if (header && dict[`header_${pageKey}`]) header.innerText = dict[`header_${pageKey}`];
            if (subheader && dict[`subheader_${pageKey}`]) subheader.innerText = dict[`subheader_${pageKey}`];

            // Translate specific buttons
            const addBtn = document.getElementById('addSetBtn');
            const finishBtn = document.querySelector('button[onclick="finishWorkout()"]');
            if (addBtn && dict.btn_add_set) addBtn.innerText = dict.btn_add_set;
            if (finishBtn && dict.btn_finish) finishBtn.innerText = dict.btn_finish;
        }

        window.addEventListener('languageChanged', translatePage);
        window.addEventListener('DOMContentLoaded', translatePage);

        // --- Theme Logic ---
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>

<body>
    <!-- Global SVG Assets -->
    <svg style="width:0; height:0; position:absolute;" aria-hidden="true" focusable="false">
        <defs>
            <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="var(--accent-red)" />
                <stop offset="100%" stop-color="var(--accent-orange)" />
            </linearGradient>
        </defs>
    </svg>

    <div class="app-container">
        <!-- SIDEBAR (desktop full / tablet icon-only) -->
        <nav class="sidebar">
            <div class="logo" style="display: flex; flex-direction: column; align-items: center; margin-bottom: 3rem; width: 100%;">
                <div class="logo-icon" style="margin-bottom: 1rem;">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21C16.9706 21 21 16.9706 21 12H17C17 14.7614 14.7614 17 12 17C9.23858 17 7 14.7614 7 12C7 9.23858 9.23858 7 12 7C13.8454 7 15.4593 8.00161 16.3214 9.5M21 12V3H17V6.5" stroke="url(#logo-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="12" r="1.5" fill="url(#logo-grad)"/>
                    </svg>
                </div>
                <h2 class="logo-text" style="margin: 0; font-size: 1.8rem;">GymBro</h2>
            </div>
            <ul class="nav-links">
                <li><a href="/" class="{% block nav_home %}{% endblock %}"><i class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg></i><span class="nav-label nav-home"> Dashboard</span></a></li>
                <li><a href="/log" class="{% block nav_log %}{% endblock %}"><i class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.4 14.4 9.6 9.6"/><path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/><path d="m21.5 21.5-1.4-1.4"/><path d="M3.9 3.9 2.5 2.5"/><path d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828l1.767-1.768a2 2 0 1 1 2.829 2.829z"/></svg></i><span class="nav-label nav-log"> Log Workout</span></a></li>
                <li><a href="/history" class="{% block nav_history %}{% endblock %}"><i class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg></i><span class="nav-label nav-history"> History</span></a></li>
                <li><a href="/timer" class="{% block nav_timer %}{% endblock %}"><i class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="15" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/></svg></i><span class="nav-label nav-timer"> Rest Timer</span></a></li>
                <li><a href="/ask" class="{% block nav_ask %}{% endblock %}"><i class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg></i><span class="nav-label nav-ask"> Ask AI</span></a></li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <a href="/settings" id="settingsBtn" class="glass" style="position: absolute; left: 0; top: 0; padding: 0.5rem; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; color: var(--text-main); text-decoration: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </a>
                <div class="mobile-logo" style="display: none; justify-content: center; margin-bottom: 0.75rem;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21C16.9706 21 21 16.9706 21 12H17C17 14.7614 14.7614 17 12 17C9.23858 17 7 14.7614 7 12C7 9.23858 9.23858 7 12 7C13.8454 7 15.4593 8.00161 16.3214 9.5M21 12V3H17V6.5" stroke="url(#logo-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="12" r="1.5" fill="url(#logo-grad)"/>
                    </svg>
                </div>
                <div class="user-greeting">
                    <h1>{% block header %}Welcome Back!{% endblock %}</h1>
                    <p>{% block subheader %}Let's smash some PRs today.{% endblock %}</p>
                </div>
                
                <button id="themeToggleBtn" onclick="toggleTheme()" class="glass" style="position: absolute; right: 0; top: 0; padding: 0.5rem; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; color: var(--text-main);">
                    <!-- Icon injected by JS -->
                </button>
            </header>
            <div class="main-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- BOTTOM NAV (mobile only, shown via CSS) -->
    <nav class="bottom-nav">
        <a href="/" class="bottom-nav-item {% block nav_home_m %}{% endblock %}">
            <span class="bottom-nav-icon" style="display: flex; align-items: center; justify-content: center;"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg></span>
            <span class="bottom-nav-label">Dashboard</span>
        </a>
        <a href="/log" class="bottom-nav-item {% block nav_log_m %}{% endblock %}">
            <span class="bottom-nav-icon" style="display: flex; align-items: center; justify-content: center;"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.4 14.4 9.6 9.6"/><path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/><path d="m21.5 21.5-1.4-1.4"/><path d="M3.9 3.9 2.5 2.5"/><path d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828l1.767-1.768a2 2 0 1 1 2.829 2.829z"/></svg></span>
            <span class="bottom-nav-label">Log</span>
        </a>
        <a href="/history" class="bottom-nav-item {% block nav_history_m %}{% endblock %}">
            <span class="bottom-nav-icon" style="display: flex; align-items: center; justify-content: center;"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg></span>
            <span class="bottom-nav-label">History</span>
        </a>
        <a href="/timer" class="bottom-nav-item {% block nav_timer_m %}{% endblock %}">
            <span class="bottom-nav-icon" style="display: flex; align-items: center; justify-content: center;"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="15" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/></svg></span>
            <span class="bottom-nav-label">Timer</span>
        </a>
        <a href="/ask" class="bottom-nav-item {% block nav_ask_m %}{% endblock %}">
            <span class="bottom-nav-icon" style="display: flex; align-items: center; justify-content: center;"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg></span>
            <span class="bottom-nav-label">Ask Me</span>
        </a>
    </nav>

    <script>
        const sunIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`;
        const moonIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`;
        
        function updateThemeIcon() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            document.getElementById('themeToggleBtn').innerHTML = currentTheme === 'light' ? moonIcon : sunIcon;
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon();
            
            // Optionally dispatch an event for charts to listen to
            window.dispatchEvent(new Event('themeChanged'));
        }

        // Init icon
        updateThemeIcon();
    </script>
</body>

</html>
