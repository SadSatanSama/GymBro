{% extends "base.html" %}

{% block title %}Join GymBro{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 1rem;">
    <div class="glass" style="width: 100%; max-width: 450px; padding: 2.5rem; border-radius: 20px; text-align: center;">
        <div style="margin-bottom: 2rem;">
            <div style="width: 70px; height: 70px; background: var(--accent-gradient); margin: 0 auto 1rem; border-radius: 15px; display: flex; align-items: center; justify-content: center; box-shadow: var(--neon-glow);">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="23" y1="11" x2="17" y2="11"></line>
                </svg>
            </div>
            <h1 style="margin: 0; font-size: 2rem; letter-spacing: -0.05rem;">Join the Squad</h1>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Create your private workout vault.</p>
        </div>

        {% if error %}
        <div style="background: rgba(255, 51, 102, 0.1); color: var(--accent-red); padding: 0.75rem; border-radius: 10px; margin-bottom: 1.5rem; font-size: 0.9rem; border: 1px solid rgba(255, 51, 102, 0.2);">
            {{ error }}
        </div>
        {% endif %}

        <form action="/register" method="POST" style="display: flex; flex-direction: column; gap: 1.25rem;">
            <div style="text-align: left;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">GymBro Name</label>
                <input type="text" name="username" class="form-control" placeholder="Warrior123" required style="width: 100%; height: 48px;">
            </div>
            <div style="text-align: left;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="your@gymbro.com" required style="width: 100%; height: 48px;">
            </div>
            <div style="text-align: left;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required style="width: 100%; height: 48px;">
                <small style="display: block; margin-top: 0.4rem; font-size: 0.8rem; color: var(--text-muted); opacity: 0.7;">At least 8 characters recommended.</small>
            </div>
            <button type="submit" class="btn-primary" style="height: 52px; font-size: 1.1rem; margin-top: 1rem;">Create Account</button>
        </form>

        <p style="margin-top: 2rem; color: var(--text-muted); font-size: 0.95rem;">
            Already a GymBro? <a href="/login" style="color: var(--accent-orange); text-decoration: none; font-weight: 600;">Log In</a>
        </p>
    </div>
</div>
{% endblock %}
