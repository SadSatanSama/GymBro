services:
  - type: web
    name: gymbro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # You will add DATABASE_URL manually in the Render Dashboard
